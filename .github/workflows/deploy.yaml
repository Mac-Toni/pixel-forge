name: Deploy para Hostinger

on:
  push:
    branches:
      - main # branch que dispara o deploy (pode ser outra, se preferir)

jobs:
  ftp-deploy:
    runs-on: ubuntu-lasted # ambiente de execução

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: /publico_html
